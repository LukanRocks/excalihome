version: 2
updates:
  - package-ecosystem: 'npm'
    # Root only: pnpm workspace has a single lockfile, so root PRs cover
    # web/ and backend/; per-directory PRs skip the lockfile entirely.
    directories:
      - '/'
    schedule:
      interval: 'weekly'
    # Match pnpm-workspace.yaml minimumReleaseAge (2880 min = 48h)
    cooldown:
      default-days: 2

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    cooldown:
      default-days: 2
