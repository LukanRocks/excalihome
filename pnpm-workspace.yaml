packages:
  - 'web'
  - 'backend'

# Supply-chain hardening
strictDepBuilds: true
minimumReleaseAge: 2880 # minutes = 48h cooldown on newly published versions
trustPolicy: no-downgrade
trustPolicyIgnoreAfter: 129600 # minutes = 90d; versions older than this skip trust checks (minimumReleaseAge covers the fresh end)

allowBuilds:
  '@tailwindcss/oxide': true
  better-sqlite3: true
  esbuild: true
  sharp: true
